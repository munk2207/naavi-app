appId: ca.naavi.app
name: 14 — Lists screen + All/Attached/Standalone tabs (Wave 2 Phase B)
tags:
  - lists
  - wave-2
  - smoke
---
# Wave 2 Phase B (Wael 2026-05-13) — Lists is a new top-level screen
# accessible from the 3-dot menu between Alerts and Notes. The screen
# has three subcategory tabs.
#
# This flow:
#   1. Opens the 3-dot menu
#   2. Taps Lists
#   3. Verifies all three tabs are visible
#   4. Taps each tab in sequence
#   5. Screenshots the All tab

- launchApp:
    clearState: false

# Open the 3-dot menu — same dual-strategy as flow 10.
- runFlow:
    when:
      visible:
        id: "topbar-menu"
    commands:
      - tapOn:
          id: "topbar-menu"
- runFlow:
    when:
      notVisible:
        id: "topbar-menu"
    commands:
      - tapOn:
          point: "95%,9%"

# Lists entry sits between Alerts and Notes per app/index.tsx:1318-1324.
- extendedWaitUntil:
    visible:
      text: "Lists"
    timeout: 5000
- tapOn:
    text: "Lists"

# Header — Stack screen options say title: 'Your Lists'.
- extendedWaitUntil:
    visible:
      text: "Your Lists"
    timeout: 5000

# Three tabs, in the order defined in app/lists.tsx::TABS.
#
# The tab JSX puts the label in the outer <Text> and the count "(N)"
# in a nested <Text style={styles.tabCount}> — different styles, so on
# Android they render as separate TextViews inside a single tab. Maestro
# substring-matches "All" reliably against the outer Text only when no
# nested child sibling exists; when the user has lists the inner "(N)"
# child appears and the matcher misses the outer "All " (trailing space).
#
# Workaround for V57.15.4 — match a regex that always lands on the outer
# Text whether the count child is present or not. testIDs are the proper
# fix and are queued for V57.15.5 in app/lists.tsx.
- extendedWaitUntil:
    visible:
      text: "All.*"
    timeout: 5000
- assertVisible:
    text: "Attached.*"
- assertVisible:
    text: "Standalone.*"

# Tap each tab — proves they're touch-responsive, not just rendered.
- tapOn:
    text: "Attached.*"
- tapOn:
    text: "Standalone.*"
- tapOn:
    text: "All.*"

- takeScreenshot: 14-lists-screen-tabs

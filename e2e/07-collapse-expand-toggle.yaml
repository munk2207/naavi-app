appId: ca.naavi.app
name: 07 — collapse-expand toggle is bidirectional (V57.9.7)
tags:
  - regression
  - chat-ui
---
# V57.9.7: older chat turns can be expanded AND collapsed back.
# Strategy: send 2 messages, verify collapse/expand/collapse cycle works.

- stopApp
- launchApp:
    clearState: true

# Send #1
- tapOn:
    label: "Message input"
- inputText: "What is the time"
- waitForAnimationToEnd
- tapOn:
    label: "Send"
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# Send #2 — pushes first turn into "Earlier:" collapsed form.
- tapOn:
    label: "Message input"
- inputText: "What is the date"
- waitForAnimationToEnd
- tapOn:
    label: "Send"
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# Collapsed summary for turn #1 must be visible.
- assertVisible:
    text: "Earlier:"
- assertVisible:
    text: "tap to expand"

# Expand.
- tapOn:
    text: "tap to expand"
- extendedWaitUntil:
    visible:
      text: "tap to collapse"
    timeout: 5000

# Collapse back.
- tapOn:
    text: "tap to collapse"
- extendedWaitUntil:
    visible:
      text: "tap to expand"
    timeout: 5000
- takeScreenshot: 07-collapsed-again

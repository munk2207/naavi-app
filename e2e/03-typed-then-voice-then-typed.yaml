appId: ${APP_ID}
name: 03 — typed → voice → typed (mode-switch state)
tags:
  - mode-switch
---
# Verifies the orchestrator transitions correctly between text and voice
# input modes without leaking state.

- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# 1. Typed send
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the time"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# 2. Wait for TTS playback to release the mic (typically 5-10s).
- extendedWaitUntil:
    visible:
      id: "mic-button-active"
    timeout: 15000
    optional: true

# 3. Voice send — optional (requires emulator mic configured).
- tapOn:
    id: "mic-button"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "mic-button"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# 4. Typed send again — verify state recovered fully.
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the date"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 03-final

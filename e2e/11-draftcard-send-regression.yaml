appId: ca.naavi.app
name: 11 — DraftCard Send commits the message (V57.11.6 regression catcher)
tags:
  - regression
  - critical
---
# Regression catcher for V57.11.6 bug: pendingActionRef was null when
# handsfreeRef guard prevented confirmPending from running. DraftCard Send
# was a no-op. After fix: Send must commit the action and the card must
# leave "draft ready" state.
#
# Naavi ALWAYS does two turns for DRAFT_MESSAGE regardless of what's in
# the first message (confirmed from screenshot: "Who should I send the
# message to?" appears even when 6135551234 is in the first message).
#
# Approach: two-turn WITHOUT collapse-expand. After Naavi's clarification
# response (detected via Collapse Chat visible), the chat stays expanded
# and Ask MyNaavi input is still accessible at the bottom of screen.
# We answer directly without collapsing.
#
# Detection: "draft ready" in draftLabel (app/index.tsx:578) — plain <Text>
# outside ConversationBubble overlay, accessible via text: matching.
# Send tap: text: "Send" matches "📱 Send" child text (By.text()).

- stopApp
- launchApp:
    clearState: false

- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# Turn 1: draft request (no number — Naavi must ask for recipient)
- tapOn:
    text: "Ask MyNaavi"
- inputText: "draft a text message saying hello"
- waitForAnimationToEnd
- pressKey: Enter

# Wait for Naavi's clarification ("Who should I send the message to?")
- extendedWaitUntil:
    visible:
      text: "Collapse Chat"
    timeout: 90000
- takeScreenshot: 11-first-response

# Turn 2: answer with phone number. Chat stays expanded — Ask MyNaavi
# is still accessible at the bottom of the expanded chat screen.
- tapOn:
    text: "Ask MyNaavi"
- inputText: "6135551234"
- waitForAnimationToEnd
- pressKey: Enter

# Wait for DraftCard to appear — 120s to handle slow Naavi responses
- extendedWaitUntil:
    visible:
      text: "draft ready"
    timeout: 180000
- takeScreenshot: 11-draftcard-visible

# Tap Send by visual child text "📱 Send" (By.text — avoids label misfire)
- tapOn:
    text: "Send"

# Regression check: "draft ready" must disappear — Send was NOT a no-op
- extendedWaitUntil:
    notVisible:
      text: "draft ready"
    timeout: 30000

- takeScreenshot: 11-after-send

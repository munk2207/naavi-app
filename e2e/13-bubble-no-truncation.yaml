appId: ca.naavi.app
name: 13 — Chat bubble shows full user message (no Yoga truncation)
tags:
  - regression
  - ui
---
# This scenario reproduces the chronic Yoga visual-truncation bug on
# Android (Samsung specifically). Symptom: user types "What is my next
# meeting?" (28 chars) — the data is stored fully but the chat bubble
# crops to "What is my next" (19 chars) on render.
#
# No stopApp here: by the time this flow runs, flow 12 has already
# timed out and the orchestrator finished processing its request
# (~15-30s into flow 12's 90s window). The app is in 'idle' state.
# Using stopApp forces a cold start which makes the calendar response
# take longer and causes the "meeting?" user-bubble timeout to fire.

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 20000

- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is my next meeting?"
- waitForAnimationToEnd
- pressKey: Enter

# The user bubble renders after the turn is added (post-response).
# textTransform does NOT apply to ConversationBubble, so "meeting?"
# (lowercase) is the actual accessibility text.
# 45s covers warm response time including any calendar API call.
- extendedWaitUntil:
    visible:
      text: "meeting?"
    timeout: 70000

- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

- takeScreenshot: 13-bubble-full-text-visible

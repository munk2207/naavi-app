appId: ca.naavi.app
name: 13 — Chat bubble shows full user message (no Yoga truncation)
tags:
  - regression
  - ui
---
# This scenario reproduces the chronic Yoga visual-truncation bug on
# Android (Samsung specifically). Symptom: user types "What is my next
# meeting?" (28 chars) — the data is stored fully but the chat bubble
# crops to "What is my next" (19 chars) on render.
#
# stopApp before launchApp ensures a clean state so cascading failures
# from the prior flow (12 — long 60s wait) don't leave the app stuck
# in a "thinking" state that would block the new message submission.

- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 40000

- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is my next meeting?"
- waitForAnimationToEnd
- pressKey: Enter

# The user bubble renders immediately after submit. textTransform does
# NOT apply to ConversationBubble, so "meeting?" (with lowercase) is
# the actual accessibility text. 30s covers cold app start + render.
- extendedWaitUntil:
    visible:
      text: "meeting?"
    timeout: 30000

- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

- takeScreenshot: 13-bubble-full-text-visible

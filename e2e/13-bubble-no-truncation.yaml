appId: ${APP_ID}
name: 13 — Chat bubble shows full user message (no Yoga truncation)
tags:
  - regression
  - ui
---
# This scenario reproduces the chronic Yoga visual-truncation bug on
# Android (Samsung specifically). Symptom: user types "What is my next
# meeting?" (28 chars) — the data is stored fully but the chat bubble
# crops to "What is my next" (19 chars) on render. Reason: Yoga measures
# the Text element's intrinsic width incorrectly; the bubble auto-sizes
# to that wrong measurement and Text never wraps.
#
# Regression history:
#   - V57.10.3: paddingRight 4 + includeFontPadding fix — partial
#   - V57.11.2: paddingRight 12 — partial
#   - V57.11.3: drop row+flex pattern — still cropped
#   - V57.11.5: outer row + column flexShrink + maxWidth — still cropped
#   - V57.11.6: maxWidth on bubble — still cropped (instrumentation proved
#     data is full at every step; pure rendering bug)
#   - V57.11.7: numeric maxWidth on Text element directly — should hold
#
# This test types a sentence whose length sits in the cropping zone, then
# asserts the FULL string appears in the chat (not the truncated form).

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is my next meeting?"
- waitForAnimationToEnd
- pressKey: Enter

# The user bubble uses a ruler+overlay layout (ConversationBubble.tsx)
# where the visible text is in a position:absolute overlay not exposed
# to Android's accessibility tree. Maestro cannot assert on user bubble
# text directly. Assert that Naavi responded (Collapse Chat appears =
# at least one turn exists). Screenshot captures the bubble for visual
# inspection of Yoga truncation.
- extendedWaitUntil:
    visible:
      text: "Collapse Chat"
    timeout: 60000

- takeScreenshot: 13-bubble-full-text-visible

appId: ca.naavi.app
name: 09 — clear chat returns to brief
tags:
  - chat-ui
---
# Verifies the Clear chat affordance unwinds chat state and
# returns the user to the brief view.

- stopApp
- launchApp:
    clearState: false
- pressKey: Back
- tapOn:
    label: "Message input"
- inputText: "Hello"
- waitForAnimationToEnd
- tapOn:
    label: "Send"
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# Clear chat link appears once a turn exists.
- extendedWaitUntil:
    visible:
      text: "Clear chat"
    timeout: 5000
- tapOn:
    text: "Clear chat"

# Brief must be visible again.
- extendedWaitUntil:
    visible:
      text: "Brief"
    timeout: 5000
- assertNotVisible:
    text: "Earlier:"
- takeScreenshot: 09-cleared

appId: ca.naavi.app
name: 09 — collapse chat returns to brief
tags:
  - chat-ui
---
# Verifies the Clear chat affordance unwinds chat state and
# returns the user to the brief view.

- stopApp
- launchApp:
    clearState: false
- assertVisible:
    text: "Ask MyNaavi"
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Hello"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# Collapse Chat button appears once a turn exists.
- extendedWaitUntil:
    visible:
      text: "Collapse Chat"
    timeout: 5000
- tapOn:
    text: "Collapse Chat"

# Brief must be visible again.
- extendedWaitUntil:
    visible:
      text: "Today's brief"
    timeout: 5000
- assertNotVisible:
    text: "Earlier:"
- takeScreenshot: 09-cleared

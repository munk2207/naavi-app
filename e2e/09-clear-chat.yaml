appId: ca.naavi.app
name: 09 — collapse chat returns to brief
tags:
  - chat-ui
---
# Verifies the Clear chat affordance unwinds chat state and
# returns the user to the brief view.

- stopApp
- launchApp:
    clearState: false
- assertVisible:
    text: "Ask MyNaavi"
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Hello"
- waitForAnimationToEnd
- pressKey: Enter

# "Collapse Chat" appears after Naavi replies. Wait up to 30s for the
# full round-trip (send → Claude → response → idle). "Ask MyNaavi" is
# the placeholder and re-appears while Claude is thinking — it cannot
# be used as a proxy for "response received". Wait for Collapse Chat
# directly with a generous timeout instead.
- extendedWaitUntil:
    visible:
      text: "Collapse Chat"
    timeout: 30000
- tapOn:
    text: "Collapse Chat"

# Brief must be visible again.
- extendedWaitUntil:
    visible:
      text: "TODAY'S BRIEF"
    timeout: 8000
- assertNotVisible:
    text: "Earlier"
- takeScreenshot: 09-cleared

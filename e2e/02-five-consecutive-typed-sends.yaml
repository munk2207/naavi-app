appId: ca.naavi.app
name: 02 — five consecutive typed sends (V57.9.5 connection-leak catcher)
tags:
  - regression
  - critical
---
- runFlow: 00-sign-in.yaml
# Reproduces the V57.9.5 bug: after 2-3 sends, the third+ hung 60-120s
# due to a remoteLog OkHttp connection leak. V57.9.6 fixed it.
# All 5 sends should complete in <30s each with Naavi replying.

- stopApp
- launchApp:
    clearState: false
- assertVisible:
    text: "Ask MyNaavi"

# --- Send 1 ---
- runFlow: 00-sign-in.yaml
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the time"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 02-after-send-1

# --- Send 2 ---
- runFlow: 00-sign-in.yaml
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What day is today"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 02-after-send-2

# --- Send 3 (the call that hung in V57.9.5) ---
- runFlow: 00-sign-in.yaml
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the date"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 02-after-send-3

# --- Send 4 ---
- runFlow: 00-sign-in.yaml
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Hello again"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 02-after-send-4

# --- Send 5 ---
- runFlow: 00-sign-in.yaml
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Thank you"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 02-after-send-5

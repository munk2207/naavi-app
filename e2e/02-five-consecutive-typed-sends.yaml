appId: ${APP_ID}
name: 02 — five consecutive typed sends (V57.9.5 connection-leak catcher)
tags:
  - regression
  - critical
---
# Reproduces the V57.9.5 bug: after 2-3 sends, the third+ hung 60-120s
# due to a remoteLog OkHttp connection leak. V57.9.6 fixed it.
# All 5 sends should complete in <45s each with Naavi replying.
# Note: do NOT re-run 00-sign-in between sends — clearState would wipe
# the session and add 45s re-auth per send, defeating the test.

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# --- Send 1 ---
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the time"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 90000
- takeScreenshot: 02-after-send-1

# --- Send 2 ---
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What day is today"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 90000
- takeScreenshot: 02-after-send-2

# --- Send 3 (the call that hung in V57.9.5) ---
- tapOn:
    text: "Ask MyNaavi"
- inputText: "What is the date"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 90000
- takeScreenshot: 02-after-send-3

# --- Send 4 ---
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Hello again"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 90000
- takeScreenshot: 02-after-send-4

# --- Send 5 ---
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Thank you"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 90000
- takeScreenshot: 02-after-send-5

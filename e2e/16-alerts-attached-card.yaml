appId: ca.naavi.app
name: 16 — Alerts screen attached-list card in expanded row (Wave 2 Phase C)
tags:
  - alerts
  - lists
  - wave-2
---
# Wave 2 Phase C (Wael 2026-05-13) — When an alert has at least one
# list attached via list_connections, the expanded alert-detail row
# in /alerts renders a section labelled "Attached list" or
# "Attached lists (N)".
#
# detailHeader style has textTransform: 'uppercase', so:
#   "When"          → "WHEN"
#   "What happens"  → "WHAT HAPPENS"
#   "Attached list" → "ATTACHED LIST"

- launchApp:
    clearState: false

# Navigate to Alerts — dual strategy for menu tap.
- runFlow:
    when:
      visible:
        id: "topbar-menu"
    commands:
      - tapOn:
          id: "topbar-menu"
- runFlow:
    when:
      notVisible:
        id: "topbar-menu"
    commands:
      - tapOn:
          label: "Open menu"

- extendedWaitUntil:
    visible:
      text: "Alerts"
    timeout: 5000
- tapOn:
    text: "Alerts"

- extendedWaitUntil:
    visible:
      text: "Your Alerts"
    timeout: 5000

# Expand the first alert row by tapping it.
# Wael's account typically has at least one alert.
- runFlow:
    when:
      notVisible:
        text: "No alerts set up yet."
    commands:
      # Tap below the screen header — first alert row.
      - tapOn:
          point: "50%,25%"

      # Detail box renders — "WHEN" + "WHAT HAPPENS" always show
      # (textTransform: uppercase on detailHeader).
      - extendedWaitUntil:
          visible:
            text: "WHEN"
          timeout: 15000
      - assertVisible:
          text: "WHAT HAPPENS"

      # IF an attached list exists, header reads "ATTACHED LIST"
      # or "ATTACHED LISTS (N)" (both uppercase via textTransform).
      - runFlow:
          when:
            visible:
              text: "ATTACHED LIST.*"
          commands:
            - assertVisible:
                text: "ATTACHED LIST.*"
            - takeScreenshot: 16-alerts-attached-card

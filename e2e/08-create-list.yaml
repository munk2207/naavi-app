appId: ca.naavi.app
name: 08 — create a shopping list (prompt v47 catcher)
tags:
  - prompt
  - lists
---
# "Create a shopping list" must emit LIST_CREATE, not a clarifying
# question. Catches prompt regressions.

- stopApp
- launchApp:
    clearState: false
- assertVisible:
    text: "Ask MyNaavi"
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Create a shopping list"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "LIST CREATED"
    timeout: 90000
- assertNotVisible:
    text: "what would you like"
- takeScreenshot: 08-list-created

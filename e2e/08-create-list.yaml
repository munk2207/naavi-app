appId: ca.naavi.app
name: 08 — create a shopping list (prompt v47 catcher)
tags:
  - prompt
  - lists
---
# Mirrors the auto-tester `lists.create` case but on the actual mobile
# UI. Catches regressions where Claude's prompt forgets that "Create a
# shopping list" should emit LIST_CREATE (not a clarifying question).
#
# V57.12.3 — assertion now checks the LIST CREATED card label rather
# than a substring of Naavi's confirmation prose. The label is from
# the React component (stable), the prose drifts.

- launchApp:
    clearState: false
- tapOn:
    label: "Message input"
- inputText: "Create a shopping list"
- waitForAnimationToEnd
- tapOn:
    label: "Send"
# Wait for the LIST CREATED card to render — proves LIST_CREATE action
# fired, not a clarifying question.
- extendedWaitUntil:
    visible:
      text: "LIST CREATED"
    timeout: 15000
# Should NOT have asked us a clarifying question.
- assertNotVisible:
    text: "what would you like"
- takeScreenshot: 08-list-created

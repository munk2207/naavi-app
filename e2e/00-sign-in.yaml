appId: ca.naavi.app
name: 00 — sign-in check (session already live on emulator)
tags:
  - setup
---
# User has signed in with Google manually on the emulator.
# This flow just launches the app and confirms the session is live.
# Do NOT use clearState: true — that would wipe the Google session.

- stopApp
- launchApp

# Wait for home screen — confirms session is live
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

- takeScreenshot: 00-sign-in-complete

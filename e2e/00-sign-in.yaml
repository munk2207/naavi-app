appId: ${APP_ID}
name: 00 — sign-in via Test Lab button
tags:
  - setup
---
# Auto sign-in: when EXPO_PUBLIC_TEST_LOGIN_ENABLED=true the app signs in
# automatically on startup (no button tap needed). Avoids React Native
# accessibility-tree issues where TouchableOpacity text is invisible to Maestro.

- clearState
- launchApp

- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 70000

- takeScreenshot: 00-sign-in-complete

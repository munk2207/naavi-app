appId: ca.naavi.app
name: 06 — spend summary (Anthropic last month → one number)
tags:
  - feature
  - spend-summary
---
# Verifies the SPEND_SUMMARY chain end-to-end. Idle-state assertion
# proves the round-trip completed (actual dollar amount depends on
# test-user invoice data and is not asserted).

- stopApp
- launchApp:
    clearState: true
- tapOn:
    label: "Message input"
- inputText: "How much did Anthropic charge me last month?"
- waitForAnimationToEnd
- tapOn:
    label: "Send"
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- takeScreenshot: 06-spend-summary-result

appId: ca.naavi.app
name: 10 — settings page renders + version visible
tags:
  - smoke
  - settings
---
# Quick smoke that the Settings page is reachable and renders the
# version line.
#
# Uses dual-strategy for menu tap: id-based when accessible tree exposes
# topbar-menu, coordinate fallback (95%,9%) otherwise. Same pattern as
# flows 14 and 15.

- launchApp:
    clearState: false

# Open the 3-dot menu — dual strategy.
- runFlow:
    when:
      visible:
        id: "topbar-menu"
    commands:
      - tapOn:
          id: "topbar-menu"
- runFlow:
    when:
      notVisible:
        id: "topbar-menu"
    commands:
      - tapOn:
          label: "Open menu"

- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000
- tapOn:
    text: "Settings"

- extendedWaitUntil:
    visible:
      text: "Sign Out"
    timeout: 40000
- assertVisible:
    text: "build"
- takeScreenshot: 10-settings

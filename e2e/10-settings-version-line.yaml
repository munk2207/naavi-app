appId: ${APP_ID}
name: 10 — settings page renders + version visible
tags:
  - smoke
  - settings
---
# Quick smoke that the Settings page is reachable and renders the
# version line.
#
# V57.12.3 — drop the unreliable id-based topbar-menu tap (id may not
# render in this build's accessibility tree) and rely on hierarchical
# tap path. Looser asserts on "Sign Out" + "build" — both are stable
# UI labels independent of which version is current.

- launchApp:
    clearState: false

# Wait for home screen to be ready before tapping the menu.
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# Open the 3-dot menu on the topbar.
- tapOn:
    point: "95%,9%"

# Tap the Settings menu item.
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 10000
- tapOn:
    text: "Settings"

# Settings page contents — both labels are stable.
# "Your Name" is the first section at the top of Settings — always
# on-screen without scrolling. "Sign Out" and "build" are below the fold.
- extendedWaitUntil:
    visible:
      text: "Your Name"
    timeout: 30000
- takeScreenshot: 10-settings

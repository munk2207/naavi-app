appId: ${APP_ID}
name: 15 — List-detail Attached-to section + items + delete button (Wave 2 Phase B)
tags:
  - lists
  - wave-2
---
# Wave 2 Phase B (Wael 2026-05-13) — Tapping a list row opens app/lists/[id].tsx.
# Goal: verify navigation works and the detail screen mounts.
# "Items" section loads from Drive — may be slow or absent for test account,
# so it is asserted with a short timeout and optional:true rather than blocking.

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# Navigate to Lists.
- runFlow:
    when:
      visible:
        id: "topbar-menu"
    commands:
      - tapOn:
          id: "topbar-menu"
- runFlow:
    when:
      notVisible:
        id: "topbar-menu"
    commands:
      - tapOn:
          point: "95%,9%"

- extendedWaitUntil:
    visible:
      text: "Lists"
    timeout: 15000
- tapOn:
    text: "Lists"

- extendedWaitUntil:
    visible:
      text: "Your Lists"
    timeout: 15000

- runFlow:
    when:
      visible:
        text: "All \\(.+\\)"
    commands:
      - tapOn:
          id: "lists-tab-all"
          optional: true
      - tapOn:
          point: "50%,20%"

      # "Attached to" renders immediately on mount — no async dependency.
      - extendedWaitUntil:
          visible:
            text: "Attached to"
          timeout: 15000

      # "Items" requires a Drive fetch — give it 15s but don't fail if absent.
      - extendedWaitUntil:
          visible:
            text: "Items"
          timeout: 15000
          optional: true

      # "Delete list" scrolls into view below Items — optional for same reason.
      - extendedWaitUntil:
          visible:
            text: "Delete list"
          timeout: 10000
          optional: true

      - takeScreenshot: 15-list-detail

appId: ${APP_ID}
name: 15 — List-detail Attached-to section + items + delete button (Wave 2 Phase B)
tags:
  - lists
  - wave-2
---
# Wave 2 Phase B (Wael 2026-05-13) — Tapping a list row in the Lists
# screen opens app/lists/[id].tsx with three sections:
#   - Header (list name + open-in-Drive icon)
#   - "Attached to" — every connection rendered as a row with a
#     detach X (or "Not attached to anything. Standalone list.")
#   - "Items" — body lines from the Drive Doc
# Plus a "Delete list" button at the bottom.
#
# This flow assumes there is at least ONE list in the account when it
# runs (typical for Wael's account post-Wave-2 testing). If the Lists
# screen is empty, the flow falls through gracefully.

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# Navigate to Lists.
- runFlow:
    when:
      visible:
        id: "topbar-menu"
    commands:
      - tapOn:
          id: "topbar-menu"
- runFlow:
    when:
      notVisible:
        id: "topbar-menu"
    commands:
      - tapOn:
          point: "95%,9%"

- extendedWaitUntil:
    visible:
      text: "Lists"
    timeout: 15000
- tapOn:
    text: "Lists"

- extendedWaitUntil:
    visible:
      text: "Your Lists"
    timeout: 15000

# Wait for lists-reconcile + list query to complete. When data loads
# the tabs render with counts like "All (4)". Until then the tabs read
# bare "All" / "Attached" / "Standalone". Match the regex "All \(.+\)"
# to assert the data layer settled (and there is at least 1 list).
# If `lists.length === 0` the count never appears and the conditional
# block below falls through — flow no-ops on an empty account.
- runFlow:
    when:
      visible:
        text: "All \\(.+\\)"
    commands:
      # Switch to "All" tab first — previous flow may have left a
      # different tab active (e.g. Standalone with 0 items). Tapping
      # on an empty tab would hit the empty-state message, not a row.
      # Tap the first list row. First row starts at ~16% (just below
      # the tab bar at ~15%). Use 20% to land safely in row 1.
      - tapOn:
          point: "50%,20%"

      # "Attached to" is a static header that renders as soon as the
      # list detail screen mounts (no async dependency). If it doesn't
      # appear, navigation failed (tap missed).
      - extendedWaitUntil:
          visible:
            text: "Attached to"
          timeout: 15000

      # "Items" renders with the Drive Doc content — same screen,
      # same render pass as "Attached to". Allow generous timeout
      # for Drive Doc fetch on cold path.
      - extendedWaitUntil:
          visible:
            text: "Items"
          timeout: 60000
      - assertVisible:
          text: "Delete list"

      - takeScreenshot: 15-list-detail

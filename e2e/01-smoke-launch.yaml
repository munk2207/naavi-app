---
- stopApp
- launchApp:
    clearState: false
# Wait for home screen to fully render before asserting.
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
- assertVisible:
    text: "MyNaavi"
- assertVisible:
    text: "TODAY'S BRIEF"
- extendedWaitUntil:
    visible:
      text: "WEATHER"
    timeout: 30000
- assertVisible:
    text: "Ask MyNaavi"
- takeScreenshot: 01-smoke-launch

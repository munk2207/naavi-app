appId: ca.naavi.app
name: 01 — smoke launch (home brief renders)
tags:
  - smoke
---
- stopApp
- launchApp:
    clearState: false
- assertVisible:
    text: "MyNaavi"
- assertVisible:
    text: "TODAY'S BRIEF"
# WEATHER is present on accounts with location configured;
# on fresh demo installs it may be absent. Soft check only.
- runFlow:
    when:
      visible:
        text: "WEATHER"
    commands:
      - assertVisible:
          text: "WEATHER"
- assertVisible:
    text: "Ask MyNaavi"
- takeScreenshot: 01-smoke-launch

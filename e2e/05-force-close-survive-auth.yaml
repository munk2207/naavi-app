appId: ${APP_ID}
name: 05 — force-close survives auth (V57.9.7 SecureStore catcher)
tags:
  - regression
  - critical
  - auth
---
# Reproduces the V57.9.7 fix: force-killing and reopening the app
# should NOT log the user out or show "Sign-in expired" banner.

- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# Confirm session is alive at start.
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Hello"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000

# Force-stop and relaunch.
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 15000

# CRITICAL — stale-auth banner must NOT appear.
- assertNotVisible:
    text: "Sign-in expired"
- takeScreenshot: 05-after-relaunch-no-banner

# Fresh send must still work without re-login.
- tapOn:
    text: "Ask MyNaavi"
- inputText: "Still here"
- waitForAnimationToEnd
- pressKey: Enter
- extendedWaitUntil:
    visible:
      text: "Ask MyNaavi"
    timeout: 30000
